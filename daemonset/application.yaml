apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-validation
  spec:
    replicas: 2
    selector: 
      matchLabels:
        app: log-validation
    template:
      labels:
        app: log-validation
    spec:
      containers:
      - name: log-validation
        image: nginx:latest
        command: ["/bin/bash"]
        args:
          - -c
          - while true; do echo "Hello from Kubernetes $(date)"; sleep 5; done
