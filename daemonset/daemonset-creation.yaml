apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-validation
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: log-validation
  template:
    metadata: 
      labels:
        app: log-validation
    spec:
      containers:
        - name: log-validation 
          image: fluent/fluentd:v1.16

          volumeMounts:
          - name: varlog
            mountPath: /var/log
          - name: containers
            mountPath: /var/log/containers

      volumes:
      - name: varlog
        hostPath:
          path: /var/log
          type: DirectoryOrCreate

      - name: containers
        hostPath:
          path: /var/log/containers