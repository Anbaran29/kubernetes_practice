apiVersion: v1
kind: Pod
metadata:
  name: postgres
  namespace: dafienz
  labels:
    app.kubernetes.io/name: nginx
    app: nginx
  spec:
    containers:
    - name: postgres
      image: postgres:15.17-trixie
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
    ports:
      - containerPort: 5432
