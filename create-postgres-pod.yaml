apiVersion: v1
kind: Pod
metadata:
  name: postgres
  namespace: dafienz
  labels:
    app.kubernetes.io/name: postgres
    app: postgres
spec:
  containers:
  - name: postgres
    image: postgres:15.17-trixie
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
    ports:
    - containerPort: 5432
    env:
    - name: POSTGRES_PASSWORD
      value: sify123
