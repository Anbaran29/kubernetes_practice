apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: db-dafienz
data:
  POSTGRES_DB: appdb
  POSTGRES_USER: appuser
  POSTGRES_PASSWORD: apppassword
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: appdb
  DB_USER: appuser
  DB_PASSWORD: apppassword
  DB_SSLMODE: disable
  APP_PORT: "8080"
  ADMINER_DEFAULT_SERVER: postgres